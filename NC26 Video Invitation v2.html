// ═══════════════════════════════════════════════════════════════════════════
// animations.jsx — Stage / Timeline / Sprite / easing helpers
// ═══════════════════════════════════════════════════════════════════════════

const Easing = {
  linear: (t) => t,
  easeInQuad:    (t) => t * t,
  easeOutQuad:   (t) => t * (2 - t),
  easeInOutQuad: (t) => (t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t),
  easeInCubic:    (t) => t * t * t,
  easeOutCubic:   (t) => (--t) * t * t + 1,
  easeInOutCubic: (t) => (t < 0.5 ? 4 * t * t * t : (t - 1) * (2 * t - 2) * (2 * t - 2) + 1),
  easeInQuart:    (t) => t * t * t * t,
  easeOutQuart:   (t) => 1 - (--t) * t * t * t,
  easeInOutQuart: (t) => (t < 0.5 ? 8 * t * t * t * t : 1 - 8 * (--t) * t * t * t),
  easeInExpo:  (t) => (t === 0 ? 0 : Math.pow(2, 10 * (t - 1))),
  easeOutExpo: (t) => (t === 1 ? 1 : 1 - Math.pow(2, -10 * t)),
  easeInOutExpo: (t) => {
    if (t === 0) return 0;
    if (t === 1) return 1;
    if (t < 0.5) return 0.5 * Math.pow(2, 20 * t - 10);
    return 1 - 0.5 * Math.pow(2, -20 * t + 10);
  },
  easeInSine:    (t) => 1 - Math.cos((t * Math.PI) / 2),
  easeOutSine:   (t) => Math.sin((t * Math.PI) / 2),
  easeInOutSine: (t) => -(Math.cos(Math.PI * t) - 1) / 2,
  easeOutBack: (t) => {
    const c1 = 1.70158, c3 = c1 + 1;
    return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
  },
  easeInBack: (t) => {
    const c1 = 1.70158, c3 = c1 + 1;
    return c3 * t * t * t - c1 * t * t;
  },
  easeInOutBack: (t) => {
    const c1 = 1.70158, c2 = c1 * 1.525;
    return t < 0.5
      ? (Math.pow(2 * t, 2) * ((c2 + 1) * 2 * t - c2)) / 2
      : (Math.pow(2 * t - 2, 2) * ((c2 + 1) * (t * 2 - 2) + c2) + 2) / 2;
  },
  easeOutElastic: (t) => {
    const c4 = (2 * Math.PI) / 3;
    if (t === 0) return 0;
    if (t === 1) return 1;
    return Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * c4) + 1;
  },
};

const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

function interpolate(input, output, ease = Easing.linear) {
  return (t) => {
    if (t <= input[0]) return output[0];
    if (t >= input[input.length - 1]) return output[output.length - 1];
    for (let i = 0; i < input.length - 1; i++) {
      if (t >= input[i] && t <= input[i + 1]) {
        const span = input[i + 1] - input[i];
        const local = span === 0 ? 0 : (t - input[i]) / span;
        const easeFn = Array.isArray(ease) ? (ease[i] || Easing.linear) : ease;
        const eased = easeFn(local);
        return output[i] + (output[i + 1] - output[i]) * eased;
      }
    }
    return output[output.length - 1];
  };
}

function animate({ from = 0, to = 1, start = 0, end = 1, ease = Easing.easeInOutCubic }) {
  return (t) => {
    if (t <= start) return from;
    if (t >= end) return to;
    const local = (t - start) / (end - start);
    return from + (to - from) * ease(local);
  };
}

const TimelineContext = React.createContext({ time: 0, duration: 10, playing: false });
const useTime = () => React.useContext(TimelineContext).time;
const useTimeline = () => React.useContext(TimelineContext);

const SpriteContext = React.createContext({ localTime: 0, progress: 0, duration: 0 });
const useSprite = () => React.useContext(SpriteContext);

function Sprite({ start = 0, end = Infinity, children, keepMounted = false }) {
  const { time } = useTimeline();
  const visible = time >= start && time <= end;
  if (!visible && !keepMounted) return null;

  const duration = end - start;
  const localTime = Math.max(0, time - start);
  const progress = duration > 0 && isFinite(duration)
    ? clamp(localTime / duration, 0, 1)
    : 0;

  const value = { localTime, progress, duration, visible };

  return (
    <SpriteContext.Provider value={value}>
      {typeof children === 'function' ? children(value) : children}
    </SpriteContext.Provider>
  );
}

function Stage({
  width = 1280,
  height = 720,
  duration = 10,
  background = '#f6f4ef',
  fps = 60,
  loop = true,
  autoplay = true,
  persistKey = 'animstage',
  children,
}) {
  const [time, setTime] = React.useState(() => {
    try {
      const v = parseFloat(localStorage.getItem(persistKey + ':t') || '0');
      return isFinite(v) ? clamp(v, 0, duration) : 0;
    } catch { return 0; }
  });
  const [playing, setPlaying] = React.useState(autoplay);
  const [hoverTime, setHoverTime] = React.useState(null);
  const [scale, setScale] = React.useState(1);

  const stageRef = React.useRef(null);
  const canvasRef = React.useRef(null);
  const rafRef = React.useRef(null);
  const lastTsRef = React.useRef(null);

  React.useEffect(() => {
    try { localStorage.setItem(persistKey + ':t', String(time)); } catch {}
  }, [time, persistKey]);

  React.useEffect(() => {
    if (!stageRef.current) return;
    const el = stageRef.current;
    const measure = () => {
      const barH = 44;
      const s = Math.min(
        el.clientWidth / width,
        (el.clientHeight - barH) / height
      );
      setScale(Math.max(0.05, s));
    };
    measure();
    const ro = new ResizeObserver(measure);
    ro.observe(el);
    window.addEventListener('resize', measure);
    return () => {
      ro.disconnect();
      window.removeEventListener('resize', measure);
    };
  }, [width, height]);

  React.useEffect(() => {
    if (!playing) {
      lastTsRef.current = null;
      return;
    }
    const step = (ts) => {
      if (lastTsRef.current == null) lastTsRef.current = ts;
      const dt = (ts - lastTsRef.current) / 1000;
      lastTsRef.current = ts;
      setTime((t) => {
        let next = t + dt;
        if (next >= duration) {
          if (loop) next = next % duration;
          else { next = duration; setPlaying(false); }
        }
        return next;
      });
      rafRef.current = requestAnimationFrame(step);
    };
    rafRef.current = requestAnimationFrame(step);
    return () => {
      if (rafRef.current) cancelAnimationFrame(rafRef.current);
      lastTsRef.current = null;
    };
  }, [playing, duration, loop]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
      if (e.code === 'Space') {
        e.preventDefault();
        setPlaying(p => !p);
      } else if (e.code === 'ArrowLeft') {
        setTime(t => clamp(t - (e.shiftKey ? 1 : 0.1), 0, duration));
      } else if (e.code === 'ArrowRight') {
        setTime(t => clamp(t + (e.shiftKey ? 1 : 0.1), 0, duration));
      } else if (e.key === '0' || e.code === 'Home') {
        setTime(0);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [duration]);

  const displayTime = hoverTime != null ? hoverTime : time;

  const ctxValue = React.useMemo(
    () => ({ time: displayTime, duration, playing, setTime, setPlaying }),
    [displayTime, duration, playing]
  );

  return (
    <div
      ref={stageRef}
      style={{
        position: 'absolute', inset: 0,
        display: 'flex', flexDirection: 'column',
        alignItems: 'center',
        background: '#0a0a0a',
        fontFamily: 'Inter, system-ui, sans-serif',
      }}
    >
      <div style={{
        flex: 1,
        width: '100%',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        overflow: 'hidden',
        minHeight: 0,
      }}>
        <div
          ref={canvasRef}
          style={{
            width, height,
            background,
            position: 'relative',
            transform: `scale(${scale})`,
            transformOrigin: 'center',
            flexShrink: 0,
            boxShadow: '0 20px 60px rgba(0,0,0,0.4)',
            overflow: 'hidden',
          }}
        >
          <TimelineContext.Provider value={ctxValue}>
            {children}
          </TimelineContext.Provider>
        </div>
      </div>

      <PlaybackBar
        time={displayTime}
        actualTime={time}
        duration={duration}
        playing={playing}
        onPlayPause={() => setPlaying(p => !p)}
        onReset={() => { setTime(0); }}
        onSeek={(t) => setTime(t)}
        onHover={(t) => setHoverTime(t)}
      />
    </div>
  );
}

function PlaybackBar({ time, duration, playing, onPlayPause, onReset, onSeek, onHover }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);

  const timeFromEvent = React.useCallback((e) => {
    const rect = trackRef.current.getBoundingClientRect();
    const x = clamp((e.clientX - rect.left) / rect.width, 0, 1);
    return x * duration;
  }, [duration]);

  const onTrackMove = (e) => {
    if (!trackRef.current) return;
    const t = timeFromEvent(e);
    if (dragging) onSeek(t); else onHover(t);
  };

  const onTrackLeave = () => { if (!dragging) onHover(null); };

  const onTrackDown = (e) => {
    setDragging(true);
    const t = timeFromEvent(e);
    onSeek(t);
    onHover(null);
  };

  React.useEffect(() => {
    if (!dragging) return;
    const onUp = () => setDragging(false);
    const onMove = (e) => {
      if (!trackRef.current) return;
      const t = timeFromEvent(e);
      onSeek(t);
    };
    window.addEventListener('mouseup', onUp);
    window.addEventListener('mousemove', onMove);
    return () => {
      window.removeEventListener('mouseup', onUp);
      window.removeEventListener('mousemove', onMove);
    };
  }, [dragging, timeFromEvent, onSeek]);

  const pct = duration > 0 ? (time / duration) * 100 : 0;
  const fmt = (t) => {
    const total = Math.max(0, t);
    const m = Math.floor(total / 60);
    const s = Math.floor(total % 60);
    const cs = Math.floor((total * 100) % 100);
    return `${String(m).padStart(1, '0')}:${String(s).padStart(2, '0')}.${String(cs).padStart(2, '0')}`;
  };

  const mono = 'JetBrains Mono, ui-monospace, SFMono-Regular, monospace';

  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 12,
      padding: '8px 16px',
      background: 'rgba(20,20,20,0.92)',
      borderTop: '1px solid rgba(255,255,255,0.08)',
      width: '100%',
      maxWidth: 680,
      alignSelf: 'center',
      borderRadius: 8,
      color: '#f6f4ef',
      fontFamily: 'Inter, system-ui, sans-serif',
      userSelect: 'none',
      flexShrink: 0,
    }}>
      <IconButton onClick={onReset} title="Return to start (0)">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M3 2v10M12 2L5 7l7 5V2z" stroke="currentColor" strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round"/>
        </svg>
      </IconButton>
      <IconButton onClick={onPlayPause} title="Play/pause (space)">
        {playing ? (
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <rect x="3" y="2" width="3" height="10" fill="currentColor"/>
            <rect x="8" y="2" width="3" height="10" fill="currentColor"/>
          </svg>
        ) : (
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M3 2l9 5-9 5V2z" fill="currentColor"/>
          </svg>
        )}
      </IconButton>

      <div style={{
        fontFamily: mono, fontSize: 12, fontVariantNumeric: 'tabular-nums',
        width: 64, textAlign: 'right', color: '#f6f4ef',
      }}>
        {fmt(time)}
      </div>

      <div
        ref={trackRef}
        onMouseMove={onTrackMove}
        onMouseLeave={onTrackLeave}
        onMouseDown={onTrackDown}
        style={{
          flex: 1, height: 22, position: 'relative', cursor: 'pointer',
          display: 'flex', alignItems: 'center',
        }}
      >
        <div style={{
          position: 'absolute', left: 0, right: 0, height: 4,
          background: 'rgba(255,255,255,0.12)', borderRadius: 2,
        }}/>
        <div style={{
          position: 'absolute', left: 0, width: `${pct}%`, height: 4,
          background: 'oklch(72% 0.12 250)', borderRadius: 2,
        }}/>
        <div style={{
          position: 'absolute', left: `${pct}%`, top: '50%',
          width: 12, height: 12, marginLeft: -6, marginTop: -6,
          background: '#fff', borderRadius: 6,
          boxShadow: '0 2px 4px rgba(0,0,0,0.4)',
        }}/>
      </div>

      <div style={{
        fontFamily: mono, fontSize: 12, fontVariantNumeric: 'tabular-nums',
        width: 64, textAlign: 'left', color: 'rgba(246,244,239,0.55)',
      }}>
        {fmt(duration)}
      </div>
    </div>
  );
}

function IconButton({ children, onClick, title }) {
  const [hover, setHover] = React.useState(false);
  return (
    <button
      onClick={onClick}
      title={title}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        width: 28, height: 28,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        background: hover ? 'rgba(255,255,255,0.12)' : 'rgba(255,255,255,0.04)',
        border: '1px solid rgba(255,255,255,0.1)',
        borderRadius: 6,
        color: '#f6f4ef',
        cursor: 'pointer',
        padding: 0,
        transition: 'background 120ms',
      }}
    >
      {children}
    </button>
  );
}

const SLIDES = [
  { id: "hero", at: 2.6,  dur: 2.8 },
  { id: "s1",   at: 5.4,  dur: 2.4 },
  { id: "s2",   at: 7.8,  dur: 2.6 },

/* ─────────── ENVELOPE ─────────── */

    >

            <line x1="3" y1="0" x2="3" y2="6" stroke="rgba(255,240,220,0.06)" strokeWidth="1" />

        <rect x="10" y="0" width="900" height="760" rx="14" fill="url(#kRibs)" />
        <rect x="10" y="0" width="900" height="760" rx="14" filter="url(#kGrain)" opacity="0.7" />
        <path d="M 10 760 L 460 250 L 910 760 Z" fill="url(#kFront)" />
        <path d="M 10 760 L 460 250 L 910 760 Z" fill="url(#kRibs)" opacity="0.85" />
        <path d="M 10 760 L 460 250 L 910 760 Z" filter="url(#kGrain)" opacity="0.6" />
        <path d="M 10 760 L 460 250 L 910 760" fill="none" stroke="rgba(60,35,10,0.18)" strokeWidth="1.5" />
        <line x1="10" y1="760" x2="460" y2="252" stroke="rgba(255,240,210,0.25)" strokeWidth="1" />
        <line x1="910" y1="760" x2="460" y2="252" stroke="rgba(255,240,210,0.25)" strokeWidth="1" />
        <image href="assets/bni-logo.png" x="330" y="570" width="260" height="95" preserveAspectRatio="xMidYMid meet" />
      </svg>

};

/* ─────────── CARD CHROME ─────────── */
const CARD_W = 760;
const CARD_H = 1180;
const CARD_LEFT = (VW - CARD_W) / 2;
const CARD_TOP_HIDDEN = 1340;
const CARD_TOP_REST = 230;

const Card = ({ children }) => {
  const t = useTime();
  const p = clamp((t - 0.7) / 2.0, 0, 1);
  const e = Easing.easeOutCubic(p);
  const top = CARD_TOP_HIDDEN + (CARD_TOP_REST - CARD_TOP_HIDDEN) * e;
  return (
    <div
      style={{
        position: "absolute",
        left: CARD_LEFT, top,
        width: CARD_W, height: CARD_H,
        background: C.card,
        borderRadius: 26,
        boxShadow: "0 30px 50px rgba(60,40,20,0.18), 0 6px 14px rgba(60,40,20,0.08), inset 0 0 0 1px rgba(0,0,0,0.04)",
        overflow: "hidden",
        zIndex: 5,
      }}
    >
      <svg style={{ position: "absolute", inset: 0, width: "100%", height: "100%", opacity: 0.55, pointerEvents: "none" }}>
        <defs>
          <filter id="cardG">
            <feTurbulence type="fractalNoise" baseFrequency="1.2" numOctaves="2" stitchTiles="stitch" />
            <feColorMatrix values="0 0 0 0 0.32  0 0 0 0 0.28  0 0 0 0 0.20  0 0 0 0.18 0" />
          </filter>
        </defs>
        <rect width="100%" height="100%" filter="url(#cardG)" />
      </svg>
      {children}
    </div>
  );
};

/* ─────────── SLIDE WRAPPER (crossfade) ─────────── */
const SlideFrame = ({ at, dur, children }) => {
  const t = useTime();
  const fade = 0.35;
  if (t < at - fade || t > at + dur + fade) return null;
  let opacity;
  if (t < at) opacity = (t - (at - fade)) / fade;
  else if (t > at + dur) opacity = 1 - (t - (at + dur)) / fade;
  else opacity = 1;
  opacity = clamp(opacity, 0, 1);
  const ty = (1 - opacity) * 18;
  return (
    <div
      style={{
        position: "absolute", inset: 0,
        padding: "70px 60px 64px",
        display: "flex", flexDirection: "column",
        fontFamily: F, color: C.ink,
        opacity, transform: `translateY(${ty}px)`,
      }}
    >
      {children}
    </div>
  );
};

const HR = ({ mt = 18, mb = 18 }) => (
  <div style={{ height: 2, background: C.ink, marginTop: mt, marginBottom: mb }} />

/* ─────────── QR ─────────── */
const QR = ({ value, size = 220, fg = "#111111", bg = "#F4EFE2", padding = 10, ecLevel = "M" }) => {
  const qr = window.qrcode(0, ecLevel);
  qr.addData(value);
  qr.make();
  const count = qr.getModuleCount();
  const cell = (size - padding * 2) / count;
  const rects = [];
  for (let r = 0; r < count; r++) {
    for (let c = 0; c < count; c++) {
      if (qr.isDark(r, c)) {
        rects.push(
          <rect key={`${r}-${c}`} x={padding + c * cell} y={padding + r * cell} width={cell + 0.5} height={cell + 0.5} fill={fg} />
        );
      }
    }
  }
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ display: "block", borderRadius: 8 }}>
      <rect width={size} height={size} fill={bg} rx="8" />
      {rects}
    </svg>
  );
};

    </div>
    {caption && <div style={{ textAlign: align, fontFamily: F_MONO, fontSize: 13, letterSpacing: "0.16em", color: C.ink, textTransform: "uppercase", marginTop: 4 }}>

const Dots = () => {
  const t = useTime();
  if (t < SLIDES[0].at - 0.5) return null;
  let activeIdx = 0;
  for (let i = 0; i < SLIDES.length; i++) {
    if (t >= SLIDES[i].at - 0.2 && t < SLIDES[i].at + SLIDES[i].dur) { activeIdx = i; break; }
    if (t >= SLIDES[i].at + SLIDES[i].dur) activeIdx = i;
  }
  return (
    <div style={{ position: "absolute", left: 0, right: 0, top: 80, display: "flex", justifyContent: "center", gap: 10, zIndex: 20 }}>
      {SLIDES.map((s, i) => (
        <div
          key={s.id}
          style={{
            width: i === activeIdx ? 36 : 10,
            height: 6,
            borderRadius: 3,
            background: i <= activeIdx ? C.ink : "rgba(17,17,17,0.2)",
            transition: "all 0.3s",
          }}
        />
      ))}
    </div>
  );
};

const TopLabel = () => {
  const t = useTime();
  if (t < 0.4) return null;
  const p = clamp((t - 0.4) / 0.5, 0, 1);
  return (
    <div

        position: "absolute", top: 130, left: 0, right: 0, textAlign: "center",
        opacity: p, transform: `translateY(${(1 - p) * 8}px)`,
        fontFamily: F_MONO, fontSize: 32, fontWeight: 500, letterSpacing: "0.32em",

  );
};
